name: Beta Firmware PreRelease

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Beta version, for example 2.0.0-beta.1 or V2.0.0-Beta.1"
        required: true
        type: string
      target:
        description: "Firmware target to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - sender
          - display
      draft:
        description: "Create the GitHub beta prerelease as draft"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  beta-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize beta version
        id: version
        shell: bash
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${RAW_VERSION#v}"
          version="${version#V}"
          version="${version/Beta/beta}"
          version="${version/BETA/beta}"
          echo "VERSION=${version}" >> "${GITHUB_ENV}"
          echo "VERSION_TAG=V${version}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=firmware-beta-V${version}" >> "${GITHUB_ENV}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "version_tag=V${version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=firmware-beta-V${version}" >> "${GITHUB_OUTPUT}"
          echo "Normalized beta version: V${version}"

      - name: Validate beta version and release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "Invalid beta version '${VERSION}'. Use x.y.z-beta.n, for example 2.0.0-beta.1." >&2
            exit 1
          fi
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag '${RELEASE_TAG}' already exists." >&2
            exit 1
          fi

      - name: Build beta firmware artifacts
        uses: ./.github/actions/firmware-build
        with:
          version: ${{ steps.version.outputs.version }}
          target: ${{ inputs.target }}
          run_tests: "true"
          release_type: prerelease
          release_tag: ${{ steps.version.outputs.release_tag }}

      - name: Create beta release tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "CAN OBD2 Beta Firmware ${VERSION_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub beta prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: CAN OBD2 Beta Firmware ${{ steps.version.outputs.version_tag }}
          files: output/*
          body_path: output/RELEASE_NOTES.md
          draft: ${{ inputs.draft }}
          prerelease: true
          generate_release_notes: true

      - name: Publish GitHub update index
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firmware-index
          name: CAN OBD2 Firmware Update Index
          files: output/update_manifest.json
          body: Machine-readable update index for device-side GitHub OTA.
          draft: false
          prerelease: true
          make_latest: false
          overwrite_files: true
