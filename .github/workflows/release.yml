name: Release Firmware

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Firmware version without leading V, for example 1.0.14"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as prerelease"
        required: true
        default: false
        type: boolean
      draft:
        description: "Create the GitHub release as draft"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    env:
      VERSION: ${{ inputs.version }}
      VERSION_TAG: V${{ inputs.version }}
      RELEASE_TAG: firmware-V${{ inputs.version }}
      CANOBD2_FIRMWARE_VERSION: V${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version input
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)*$ ]]; then
            echo "Invalid version '${VERSION}'. Use values like 1.0.14 or 1.0.14-rc1." >&2
            exit 1
          fi
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag '${RELEASE_TAG}' already exists." >&2
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Use example secrets for release build
        shell: bash
        run: |
          set -euo pipefail
          cp include/secrets.example.h include/secrets.h
          echo "Release builds use include/secrets.example.h placeholder credentials."

      - name: Build sender and display firmware
        run: |
          platformio run -e sender -e display

      - name: Run native unit tests
        run: |
          platformio test -e native

      - name: Prepare firmware artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output

          cp .pio/build/sender/firmware.bin "output/CAN_OBD2_sender_${VERSION_TAG}.bin"
          cp .pio/build/display/firmware.bin "output/CAN_OBD2_display_${VERSION_TAG}.bin"
          cp .pio/build/sender/firmware.bin "output/sender.bin"
          cp .pio/build/display/firmware.bin "output/display.bin"
          cp .pio/build/sender/firmware.elf "output/CAN_OBD2_sender_${VERSION_TAG}.elf"
          cp .pio/build/display/firmware.elf "output/CAN_OBD2_display_${VERSION_TAG}.elf"

          sender_sha256="$(sha256sum output/sender.bin | awk '{print $1}')"
          display_sha256="$(sha256sum output/display.bin | awk '{print $1}')"

          {
            echo "{"
            echo "  \"version\": \"${VERSION_TAG}\","
            echo "  \"commit\": \"${GITHUB_SHA}\","
            echo "  \"protocol\": 2,"
            echo "  \"sender_bin\": \"CAN_OBD2_sender_${VERSION_TAG}.bin\","
            echo "  \"display_bin\": \"CAN_OBD2_display_${VERSION_TAG}.bin\","
            echo "  \"sender_bin_stable\": \"sender.bin\","
            echo "  \"display_bin_stable\": \"display.bin\","
            echo "  \"sender_sha256\": \"${sender_sha256}\","
            echo "  \"display_sha256\": \"${display_sha256}\""
            echo "}"
          } > output/firmware_manifest.json

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CAN_OBD2_firmware_${{ env.VERSION_TAG }}
          path: output/

      - name: Create release tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "CAN OBD2 Firmware ${VERSION_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: CAN OBD2 Firmware ${{ env.VERSION_TAG }}
          files: output/*
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
