name: Release Firmware

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.15 or V1.0.15"
        required: true
        type: string
      target:
        description: "Firmware target to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - sender
          - display
      draft:
        description: "Create the GitHub release as draft"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize release version
        id: version
        shell: bash
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${RAW_VERSION#v}"
          version="${version#V}"
          version="${version/Beta/beta}"
          version="${version/BETA/beta}"
          echo "VERSION=${version}" >> "${GITHUB_ENV}"
          echo "VERSION_TAG=V${version}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=firmware-V${version}" >> "${GITHUB_ENV}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "version_tag=V${version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=firmware-V${version}" >> "${GITHUB_OUTPUT}"
          echo "Normalized release version: V${version}"

      - name: Validate version input and release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)*$ ]]; then
            echo "Invalid version '${VERSION}'. Use values like 1.0.15 or 1.0.15.test1." >&2
            exit 1
          fi
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag '${RELEASE_TAG}' already exists." >&2
            exit 1
          fi

      - name: Build firmware artifacts
        uses: ./.github/actions/firmware-build
        with:
          version: ${{ steps.version.outputs.version }}
          target: ${{ inputs.target }}
          run_tests: "true"
          release_type: release

      - name: Create release tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "CAN OBD2 Firmware ${VERSION_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: CAN OBD2 Firmware ${{ steps.version.outputs.version_tag }}
          files: output/*
          body_path: output/RELEASE_NOTES.md
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
