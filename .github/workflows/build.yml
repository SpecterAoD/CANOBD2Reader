name: Build Firmware

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}

    env:
      VERSION_FILE: VERSION.txt

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Use example secrets for CI build
        shell: bash
        run: |
          set -euo pipefail
          cp include/secrets.example.h include/secrets.h
          echo "CI builds use include/secrets.example.h placeholder credentials."

      - name: Calculate firmware version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$VERSION_FILE" ]; then
            echo "V1.0.0" > "$VERSION_FILE"
          fi

          raw_version="$(tr -d '\r\n[:space:]' < "$VERSION_FILE")"
          raw_version="${raw_version#v}"
          raw_version="${raw_version#V}"

          IFS='.' read -r major minor patch <<< "$raw_version"
          major="${major:-1}"
          minor="${minor:-0}"
          patch="${patch:-0}"

          if [[ ! "$major" =~ ^[0-9]+$ ]]; then major=1; fi
          if [[ ! "$minor" =~ ^[0-9]+$ ]]; then minor=0; fi
          if [[ ! "$patch" =~ ^[0-9]+$ ]]; then patch=0; fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            version="${major}.${minor}.${patch}-pr${{ github.event.number }}.${{ github.run_number }}"
            version_tag="V${version}"
          else
            version="${major}.${minor}.${patch}-ci.${{ github.run_number }}"
            version_tag="V${version}"
          fi

          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "VERSION_TAG=$version_tag" >> "$GITHUB_ENV"
          echo "CANOBD2_FIRMWARE_VERSION=$version_tag" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"
          echo "Firmware version: $version_tag"

      - name: Build sender and display firmware
        run: |
          platformio run -e sender -e display

      - name: Verify firmware OTA metadata
        shell: bash
        run: |
          set -euo pipefail
          grep -a -q "CANOBD2_FW_METADATA_BEGIN" .pio/build/sender/firmware.bin
          grep -a -q "target=sender" .pio/build/sender/firmware.bin
          grep -a -q "version=${VERSION_TAG}" .pio/build/sender/firmware.bin
          grep -a -q "protocol=2" .pio/build/sender/firmware.bin
          grep -a -q "CANOBD2_FW_METADATA_BEGIN" .pio/build/display/firmware.bin
          grep -a -q "target=display" .pio/build/display/firmware.bin
          grep -a -q "version=${VERSION_TAG}" .pio/build/display/firmware.bin
          grep -a -q "protocol=2" .pio/build/display/firmware.bin

      - name: Run native unit tests
        run: |
          platformio test -e native

      - name: Prepare firmware artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output
          channel="ci"

          cp .pio/build/sender/firmware.bin "output/CAN_OBD2_sender_${VERSION_TAG}.bin"
          cp .pio/build/display/firmware.bin "output/CAN_OBD2_display_${VERSION_TAG}.bin"
          cp .pio/build/sender/firmware.bin "output/sender.bin"
          cp .pio/build/display/firmware.bin "output/display.bin"
          cp .pio/build/sender/firmware.elf "output/CAN_OBD2_sender_${VERSION_TAG}.elf"
          cp .pio/build/display/firmware.elf "output/CAN_OBD2_display_${VERSION_TAG}.elf"

          sender_sha256="$(sha256sum output/sender.bin | awk '{print $1}')"
          display_sha256="$(sha256sum output/display.bin | awk '{print $1}')"

          {
            echo "{"
            echo "  \"version\": \"${VERSION_TAG}\","
            echo "  \"commit\": \"${GITHUB_SHA}\","
            echo "  \"target\": \"all\","
            echo "  \"release_type\": \"ci\","
            echo "  \"channel\": \"${channel}\","
            echo "  \"is_test_firmware\": true,"
            echo "  \"protocol\": 2,"
            echo "  \"ota_metadata\": \"CANOBD2_FW_METADATA_BEGIN\","
            echo "  \"sender_bin\": \"CAN_OBD2_sender_${VERSION_TAG}.bin\","
            echo "  \"display_bin\": \"CAN_OBD2_display_${VERSION_TAG}.bin\","
            echo "  \"sender_bin_stable\": \"sender.bin\","
            echo "  \"display_bin_stable\": \"display.bin\","
            echo "  \"sender_sha256\": \"${sender_sha256}\","
            echo "  \"display_sha256\": \"${display_sha256}\""
            echo "}"
          } > output/firmware_manifest.json

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CAN_OBD2_firmware_${{ env.VERSION_TAG }}
          path: output/
