name: Documentation

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/generate_*.py"
      - "scripts/verify_docs.py"
      - "platformio.ini"
      - "include/config/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate automatic documentation
        run: |
          python scripts/generate_project_index.py
          python scripts/generate_build_docs.py
          python scripts/generate_config_reference.py
          python scripts/generate_test_overview.py
          python scripts/export_firmware_info.py --target all --output docs/AUTO_FIRMWARE_ARTIFACTS.md

      - name: Verify documentation
        run: |
          python scripts/verify_docs.py
          python scripts/check_line_endings.py

      - name: Upload generated documentation
        uses: actions/upload-artifact@v4
        with:
          name: AUTO_DOCS
          path: docs/AUTO_*.md
